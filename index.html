<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 你的餐點組合生成器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="topbar__brand">
                <div class="logo">🍽️</div>
                <div>
                    <h1>餐點組合生成器</h1>
                    <p class="subtitle">快速生成今天的早餐、午餐、晚餐，並同步儲存到 Google 試算表。</p>
                </div>
            </div>
            <div class="topbar__note">更簡潔、易讀、專注功能</div>
        </header>

        <main class="layout">
            <aside class="panel sidebar-panel">
                <div class="panel__header">
                    <div class="panel__title">🎯 飲食偏好</div>
                    <div class="panel__subtitle">設定你的餐點條件，生成更符合口味的組合。</div>
                </div>

                <section class="panel__section">
                    <h2>飲食限制</h2>
                    <div class="field-grid">
                        <label class="field-chip"><input type="checkbox" name="restriction" value="素食"><span>素食</span></label>
                        <label class="field-chip"><input type="checkbox" name="restriction" value="全素"><span>全素</span></label>
                        <label class="field-chip"><input type="checkbox" name="restriction" value="無麩質"><span>無麩質</span></label>
                        <label class="field-chip"><input type="checkbox" name="restriction" value="低碳水"><span>低碳水</span></label>
                        <label class="field-chip"><input type="checkbox" name="restriction" value="無乳製品"><span>無乳製品</span></label>
                    </div>
                </section>

                <section class="panel__section">
                    <h2>口味偏好</h2>
                    <div class="field-grid field-grid--small">
                        <label class="field-chip"><input type="radio" name="taste" value="重口味"><span>重口味</span></label>
                        <label class="field-chip"><input type="radio" name="taste" value="中等"><span>中等</span></label>
                        <label class="field-chip"><input type="radio" name="taste" value="清淡"><span>清淡</span></label>
                    </div>
                </section>

                <section class="panel__section">
                    <h2>過敏 / 禁忌</h2>
                    <input id="allergies" class="input-text" type="text" placeholder="例如：海鮮、堅果、雞蛋（以逗號分隔）">
                </section>

                <section class="panel__section">
                    <h2>其他偏好</h2>
                    <div class="field-grid">
                        <label class="field-chip"><input type="checkbox" name="other" value="健身餐"><span>健身餐</span></label>
                        <label class="field-chip"><input type="checkbox" name="other" value="低熱量"><span>低熱量</span></label>
                        <label class="field-chip"><input type="checkbox" name="other" value="快手餐"><span>快手餐</span></label>
                        <label class="field-chip"><input type="checkbox" name="other" value="高蛋白"><span>高蛋白</span></label>
                    </div>
                </section>

                <section class="panel__section">
                    <h2>備註與需求</h2>
                    <textarea id="userNote" class="input-text input-textarea" rows="5" placeholder="例如：想吃台式、避免油膩、希望全素或低卡"></textarea>
                </section>

                <div class="panel__actions">
                    <button id="savePrefs" class="btn btn-primary">💾 保存偏好</button>
                    <button id="resetPrefs" class="btn btn-secondary">🔄 重置</button>
                </div>
            </aside>

            <section class="panel content-panel">
                <div class="panel__hero">
                    <div>
                        <h2>今日餐點建議</h2>
                        <p>從您的偏好中挑選三餐搭配，並同步儲存歷史與偏好記錄。</p>
                    </div>
                    <button id="generateBtn" class="btn btn-accent">✨ 生成新組合</button>
                </div>

                <div id="resultsContainer" class="results-card">
                    <div class="empty-state">
                        <p>按一下上方按鈕，即可產生今天的早餐 / 午餐 / 晚餐。</p>
                    </div>
                </div>

                <div class="panel__section panel__section--split">
                    <div class="panel__card panel__card--soft">
                        <h3>📌 管理工具</h3>
                        <p>新增或修改餐點品項，請使用管理頁面。</p>
                        <a href="admin.html" class="btn btn-primary btn-block">前往餐點管理</a>
                    </div>

                    <div class="panel__card panel__card--soft">
                        <h3>📜 最近生成</h3>
                        <div id="historyContainer" class="history-list">
                            <p class="empty">暫無記錄</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="page-footer">
            <div id="status" class="status-bar">準備就緒 ✓</div>
            <div class="footer-text">所有資料會同步儲存並保留最新偏好。</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
